<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111e2c"/>
      <stop offset="100%" stop-color="#080d13"/>
    </linearGradient>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e00000"/>
      <stop offset="100%" stop-color="#900000"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Red badge background pill -->
  <rect x="3" y="10" width="26" height="12" rx="6" fill="url(#rg)"/>
  <!-- KIA text -->
  <text x="16" y="20.5" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="9.5" fill="white" letter-spacing="1.5">KIA</text>
  <!-- Small corner accent dots -->
  <circle cx="5.5" cy="5.5" r="1.5" fill="#bb0000" opacity="0.6"/>
  <circle cx="26.5" cy="5.5" r="1.5" fill="#bb0000" opacity="0.6"/>
</svg>